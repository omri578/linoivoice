
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
.app{background:#2E2870;border-radius:20px;font-family:var(--font-sans);direction:rtl;overflow:hidden;max-width:400px;margin:0 auto}
.hero{padding:2rem 1.25rem 1.5rem;text-align:center}
.avatar{width:96px;height:96px;border-radius:50%;background:rgba(255,255,255,0.1);border:0.5px solid rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;transition:background 0.2s,transform 0.2s}
.avatar.rec{background:rgba(226,75,74,0.3);transform:scale(1.05)}
.avatar i{font-size:40px;color:rgba(255,255,255,0.9)}
.avatar.rec i{color:#F09595}
.hero h1{font-size:22px;font-weight:500;color:#fff;margin-bottom:4px}
.hero small{font-size:13px;color:rgba(255,255,255,0.45)}
.pill{display:inline-flex;align-items:center;gap:6px;margin-top:14px;padding:6px 16px;border-radius:20px;background:rgba(255,255,255,0.08);border:0.5px solid rgba(255,255,255,0.12);font-size:13px;color:rgba(255,255,255,0.55)}
.pill.rec{background:rgba(226,75,74,0.18);color:#F7C1C1}
.pill.done{background:rgba(29,158,117,0.18);color:#9FE1CB}
.blink{width:7px;height:7px;border-radius:50%;background:currentColor;animation:bl 1s infinite;flex-shrink:0}
@keyframes bl{0%,100%{opacity:1}50%{opacity:.1}}
.body{padding:0 1rem 1.5rem;display:flex;flex-direction:column;gap:12px}
.card{background:rgba(255,255,255,0.07);border:0.5px solid rgba(255,255,255,0.1);border-radius:16px;padding:1.25rem}
.lbl{font-size:11px;font-weight:500;letter-spacing:.07em;text-transform:uppercase;color:rgba(255,255,255,0.3);margin-bottom:14px}
.big-btn{width:100%;padding:18px;font-size:16px;font-weight:500;border-radius:12px;border:0.5px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.08);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:12px;min-height:56px}
.big-btn:active{transform:scale(0.97)}
.big-btn.rec{background:rgba(226,75,74,0.2);border-color:rgba(226,75,74,0.4);color:#F7C1C1}
.timer{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:14px;font-size:14px;color:#F09595;font-weight:500}
.spd-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.spd-big{font-size:32px;font-weight:500;color:#CECBF6;line-height:1}
.spd-x{font-size:18px;color:#AFA9EC}
.spd-lbl{font-size:13px;color:rgba(255,255,255,0.38)}
input[type=range]{width:100%;accent-color:#7F77DD;cursor:pointer}
.presets{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:14px}
.pre{padding:10px 4px;font-size:13px;font-weight:500;border-radius:10px;border:0.5px solid rgba(255,255,255,0.14);background:transparent;color:rgba(255,255,255,0.45);cursor:pointer;min-height:40px}
.pre:active{transform:scale(0.94)}
.pre.on{background:#534AB7;border-color:#7F77DD;color:#EEEDFE}
.player{background:rgba(255,255,255,0.05);border:0.5px solid rgba(255,255,255,0.08);border-radius:12px;padding:14px;margin-top:14px;display:flex;align-items:center;gap:12px}
.play-btn{width:48px;height:48px;border-radius:50%;background:#534AB7;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.play-btn:active{transform:scale(0.92)}
.play-btn i{font-size:20px;color:#fff}
.prog-wrap{flex:1;min-width:0}
.prog-times{display:flex;justify-content:space-between;font-size:11px;color:rgba(255,255,255,0.35);margin-bottom:8px}
.prog-track{width:100%;height:5px;background:rgba(255,255,255,0.1);border-radius:3px;cursor:pointer}
.prog-fill{height:5px;background:#7F77DD;border-radius:3px;width:0%;transition:width 0.1s}
.share-btn{width:100%;padding:18px;font-size:16px;font-weight:500;border-radius:12px;border:0.5px solid rgba(29,158,117,0.4);background:rgba(29,158,117,0.12);color:#9FE1CB;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;min-height:56px}
.share-btn:active{transform:scale(0.97)}
.share-btn:disabled{opacity:.35;cursor:default}
.prog-bar-wrap{height:4px;background:rgba(255,255,255,0.1);border-radius:2px;margin-top:10px;overflow:hidden}
.prog-bar-fill{height:4px;background:#9FE1CB;border-radius:2px;width:0%;transition:width 0.2s}
.hint{font-size:12px;color:rgba(255,255,255,0.28);text-align:center;margin-top:10px}
.hidden{display:none}
</style>

<h2 class="sr-only">הקול של לינוי</h2>
<div class="app">
  <div class="hero">
    <div class="avatar" id="av"><i class="ti ti-microphone" id="avI" aria-hidden="true"></i></div>
    <h1>הקול של לינוי</h1>
    <small>מהיר · קול רגיל · שיתוף אמיתי</small>
    <div><span class="pill" id="pill"><span id="pillTxt">מוכן להקלטה</span></span></div>
  </div>
  <div class="body">
    <div class="card">
      <div class="lbl">הקלטה</div>
      <button class="big-btn" id="rb" onclick="tog()">
        <i class="ti ti-microphone" id="rI" style="font-size:22px" aria-hidden="true"></i>
        <span id="rT">התחל הקלטה</span>
      </button>
      <div class="timer hidden" id="tmr">
        <div class="blink"></div><span id="tv">0:00</span>
      </div>
    </div>

    <div class="card hidden" id="spdCard">
      <div class="lbl">מהירות</div>
      <div class="spd-header">
        <div><span class="spd-big" id="sN">1.70</span><span class="spd-x">×</span></div>
        <span class="spd-lbl" id="sTag">מהיר</span>
      </div>
      <input type="range" id="sl" min="0.5" max="3.0" step="0.05" value="1.70" oninput="onSpd(this.value)">
      <div class="presets">
        <button class="pre" onclick="setS(1.0)">×1</button>
        <button class="pre on" onclick="setS(1.70)">×1.7</button>
        <button class="pre" onclick="setS(2.0)">×2</button>
        <button class="pre" onclick="setS(2.5)">×2.5</button>
      </div>
      <div class="player">
        <button class="play-btn" onclick="togglePlay()" aria-label="נגן">
          <i class="ti ti-player-play" id="playI" aria-hidden="true"></i>
        </button>
        <div class="prog-wrap">
          <div class="prog-times"><span id="curT">0:00</span><span id="durT">0:00</span></div>
          <div class="prog-track" onclick="seek(event)"><div class="prog-fill" id="pf"></div></div>
        </div>
      </div>
    </div>

    <div class="card hidden" id="shareCard">
      <div class="lbl">שיתוף</div>
      <button class="share-btn" id="shareBtn" onclick="doShare()">
        <i class="ti ti-share" style="font-size:20px" aria-hidden="true"></i>
        <span id="shareTxt">שתף הודעה קולית</span>
      </button>
      <div class="prog-bar-wrap hidden" id="procWrap">
        <div class="prog-bar-fill" id="procFill"></div>
      </div>
      <p class="hint" id="hint">הקובץ ישמע בדיוק כמו כאן</p>
    </div>
  </div>
</div>

<script>
let mr,ch=[],rawBlob=null,decodedBuf=null,spd=1.70,sec=0,tk=null,aud=null,raf=null;

const tl=s=>s<0.8?'איטי מאוד':s<1?'איטי':s===1?'רגיל':s<1.5?'מהיר קצת':s<2?'מהיר':s<2.5?'מהיר מאוד':'טורבו';
const fmt=s=>{if(!isFinite(s)||s<0)return'0:00';return Math.floor(s/60)+':'+String(Math.floor(s%60)).padStart(2,'0');};
const yield_=()=>new Promise(r=>setTimeout(r,0));

function setPill(t,cls){
  const p=document.getElementById('pill');
  p.className='pill'+(cls?' '+cls:'');
  const d=p.querySelector('.blink');
  if(cls==='rec'){if(!d){const x=document.createElement('div');x.className='blink';p.prepend(x);}}
  else if(d)d.remove();
  document.getElementById('pillTxt').textContent=t;
}

function tog(){if(mr&&mr.state==='recording')stopR();else startR();}

async function startR(){
  try{
    const s=await navigator.mediaDevices.getUserMedia({audio:true});
    ch=[];mr=new MediaRecorder(s);
    mr.ondataavailable=e=>ch.push(e.data);
    mr.onstop=onStop;mr.start();
    document.getElementById('rb').classList.add('rec');
    document.getElementById('rI').className='ti ti-player-stop';
    document.getElementById('rT').textContent='עצור הקלטה';
    document.getElementById('tmr').classList.remove('hidden');
    document.getElementById('av').classList.add('rec');
    document.getElementById('avI').className='ti ti-microphone-off';
    setPill('מקליט...','rec');
    sec=0;tick();tk=setInterval(tick,1000);
  }catch(e){alert('אנא אשר גישה למיקרופון');}
}

function stopR(){
  mr.stop();mr.stream.getTracks().forEach(t=>t.stop());
  clearInterval(tk);
  document.getElementById('rb').classList.remove('rec');
  document.getElementById('rI').className='ti ti-microphone';
  document.getElementById('rT').textContent='הקלט שוב';
  document.getElementById('tmr').classList.add('hidden');
  document.getElementById('av').classList.remove('rec');
  document.getElementById('avI').className='ti ti-microphone';
  setPill('מעבד...');
}

function tick(){document.getElementById('tv').textContent=fmt(sec);sec++;}

async function onStop(){
  rawBlob=new Blob(ch,{type:'audio/webm'});
  await new Promise(r=>setTimeout(r,300));
  const ctx=new(window.AudioContext||window.webkitAudioContext)();
  const ab=await rawBlob.arrayBuffer();
  decodedBuf=await ctx.decodeAudioData(ab);
  buildPlayer();
  document.getElementById('spdCard').classList.remove('hidden');
  document.getElementById('shareCard').classList.remove('hidden');
  setPill('מוכן לשליחה','done');
}

function buildPlayer(){
  if(aud){aud.pause();try{aud.remove();}catch(e){}}
  aud=document.createElement('audio');
  aud.src=URL.createObjectURL(rawBlob);
  aud.preload='metadata';
  applySpeed(aud);
  document.body.appendChild(aud);
  aud.addEventListener('timeupdate',updProg);
  aud.addEventListener('loadedmetadata',updProg);
  aud.addEventListener('ended',()=>{cancelAnimationFrame(raf);document.getElementById('playI').className='ti ti-player-play';});
}

function applySpeed(el){
  el.playbackRate=spd;
  if('preservesPitch' in el)el.preservesPitch=true;
  else if('mozPreservesPitch' in el)el.mozPreservesPitch=true;
  else if('webkitPreservesPitch' in el)el.webkitPreservesPitch=true;
}

function togglePlay(){
  if(!aud)return;
  if(aud.paused){aud.play();document.getElementById('playI').className='ti ti-player-pause';loopP();}
  else{aud.pause();document.getElementById('playI').className='ti ti-player-play';cancelAnimationFrame(raf);}
}

function loopP(){updProg();raf=requestAnimationFrame(loopP);}

function updProg(){
  if(!aud)return;
  const c=aud.currentTime,d=aud.duration||0;
  document.getElementById('pf').style.width=(d>0?(c/d)*100:0)+'%';
  document.getElementById('curT').textContent=fmt(c);
  document.getElementById('durT').textContent=fmt(d);
}

function seek(e){
  if(!aud||!aud.duration)return;
  const r=e.currentTarget.getBoundingClientRect();
  aud.currentTime=Math.max(0,Math.min(1,(e.clientX-r.left)/r.width))*aud.duration;
}

function onSpd(v){
  spd=parseFloat(v);
  document.getElementById('sN').textContent=spd.toFixed(2);
  document.getElementById('sTag').textContent=tl(spd);
  if(aud)applySpeed(aud);
  document.querySelectorAll('.pre').forEach(b=>b.classList.remove('on'));
  [1.0,1.70,2.0,2.5].forEach((p,i)=>{if(Math.abs(spd-p)<0.01)document.querySelectorAll('.pre')[i].classList.add('on');});
}

function setS(v){document.getElementById('sl').value=v;onSpd(v);}

async function doShare(){
  if(!decodedBuf)return;
  const btn=document.getElementById('shareBtn');
  const txt=document.getElementById('shareTxt');
  const wrap=document.getElementById('procWrap');
  const fill=document.getElementById('procFill');
  const hint=document.getElementById('hint');

  btn.disabled=true;
  txt.textContent='מעבד...';
  wrap.classList.remove('hidden');
  fill.style.width='0%';

  const wav=await timeStretchChunked(decodedBuf,spd,(pct)=>{
    fill.style.width=pct+'%';
  });

  wrap.classList.add('hidden');
  btn.disabled=false;
  txt.textContent='שתף הודעה קולית';

  const file=new File([wav],'linoy_voice.wav',{type:'audio/wav'});
  if(navigator.share){
    try{
      await navigator.share({files:[file],title:'הודעה קולית של לינוי'});
      hint.textContent='שותף בהצלחה!';
      return;
    }catch(e){if(e.name==='AbortError')return;}
  }
  const a=document.createElement('a');
  a.href=URL.createObjectURL(wav);
  a.download='linoy_voice.wav';
  document.body.appendChild(a);a.click();a.remove();
  hint.textContent='הורד — פתח ווטסאפ וצרף';
}

async function timeStretchChunked(buf,tempo,onProgress){
  const sr=buf.sampleRate;
  const nc=buf.numberOfChannels;
  const ns=buf.length;
  const CHUNK=8192;
  const outL=[];
  const outR=[];

  const ch0=buf.getChannelData(0);
  const ch1=nc>1?buf.getChannelData(1):ch0;

  const newLen=Math.ceil(ns/tempo);
  let inPos=0;
  let outPos=0;
  let lastYield=Date.now();

  while(outPos<newLen){
    const srcIdx=Math.floor(outPos*tempo);
    const end=Math.min(outPos+CHUNK,newLen);
    for(let i=outPos;i<end;i++){
      const si=Math.floor(i*tempo);
      const si2=Math.min(si+1,ns-1);
      const frac=(i*tempo)-si;
      outL.push(ch0[si]*(1-frac)+ch0[si2]*frac);
      outR.push(ch1[si]*(1-frac)+ch1[si2]*frac);
    }
    outPos=end;
    onProgress(Math.round((outPos/newLen)*100));
    if(Date.now()-lastYield>16){await yield_();lastYield=Date.now();}
  }

  const outNs=outL.length;
  const bl=4,ds=outNs*bl*2;
  const ab=new ArrayBuffer(44+ds),v=new DataView(ab);
  const ws=(o,s)=>{for(let i=0;i<s.length;i++)v.setUint8(o+i,s.charCodeAt(i));};
  ws(0,'RIFF');v.setUint32(4,36+ds,true);ws(8,'WAVE');ws(12,'fmt ');
  v.setUint32(16,16,true);v.setUint16(20,3,true);v.setUint16(22,2,true);
  v.setUint32(24,sr,true);v.setUint32(28,sr*bl*2,true);
  v.setUint16(32,bl*2,true);v.setUint16(34,32,true);
  ws(36,'data');v.setUint32(40,ds,true);
  let off=44;
  for(let i=0;i<outNs;i++){
    v.setFloat32(off,Math.max(-1,Math.min(1,outL[i])),true);off+=4;
    v.setFloat32(off,Math.max(-1,Math.min(1,outR[i])),true);off+=4;
  }
  return new Blob([ab],{type:'audio/wav'});
}
</script>
