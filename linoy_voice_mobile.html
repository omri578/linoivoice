
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
.app{background:#2E2870;border-radius:20px;font-family:var(--font-sans);direction:rtl;overflow:hidden;max-width:400px;margin:0 auto}

.hero{padding:2rem 1.25rem 1.75rem;text-align:center}
.avatar{width:96px;height:96px;border-radius:50%;background:rgba(255,255,255,0.1);border:0.5px solid rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;transition:background 0.2s,transform 0.2s}
.avatar.rec{background:rgba(226,75,74,0.3);border-color:rgba(226,75,74,0.5);transform:scale(1.05)}
.avatar i{font-size:40px;color:rgba(255,255,255,0.9)}
.avatar.rec i{color:#F09595}
.hero h1{font-size:22px;font-weight:500;color:#fff;margin-bottom:4px}
.hero small{font-size:13px;color:rgba(255,255,255,0.45)}
.pill{display:inline-flex;align-items:center;gap:6px;margin-top:14px;padding:6px 16px;border-radius:20px;background:rgba(255,255,255,0.08);border:0.5px solid rgba(255,255,255,0.12);font-size:13px;color:rgba(255,255,255,0.55)}
.pill.rec{background:rgba(226,75,74,0.18);border-color:rgba(226,75,74,0.35);color:#F7C1C1}
.pill.done{background:rgba(29,158,117,0.18);border-color:rgba(29,158,117,0.35);color:#9FE1CB}
.blink{width:7px;height:7px;border-radius:50%;background:currentColor;animation:bl 1s infinite;flex-shrink:0}
@keyframes bl{0%,100%{opacity:1}50%{opacity:.1}}

.body{padding:0 1rem 1.5rem;display:flex;flex-direction:column;gap:12px}

.card{background:rgba(255,255,255,0.07);border:0.5px solid rgba(255,255,255,0.1);border-radius:16px;padding:1.25rem}
.lbl{font-size:11px;font-weight:500;letter-spacing:.07em;text-transform:uppercase;color:rgba(255,255,255,0.3);margin-bottom:14px}

.big-btn{width:100%;padding:18px;font-size:16px;font-weight:500;border-radius:12px;border:0.5px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.08);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:12px;transition:background 0.15s;min-height:56px}
.big-btn:active{transform:scale(0.97)}
.big-btn.rec{background:rgba(226,75,74,0.2);border-color:rgba(226,75,74,0.4);color:#F7C1C1}
.timer{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:14px;font-size:14px;color:#F09595;font-weight:500}

.spd-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.spd-big{font-size:32px;font-weight:500;color:#CECBF6;line-height:1}
.spd-x{font-size:18px;color:#AFA9EC}
.spd-lbl{font-size:13px;color:rgba(255,255,255,0.38)}
input[type=range]{width:100%;accent-color:#7F77DD;cursor:pointer}
.presets{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:14px}
.pre{padding:10px 4px;font-size:13px;font-weight:500;border-radius:10px;border:0.5px solid rgba(255,255,255,0.14);background:transparent;color:rgba(255,255,255,0.45);cursor:pointer;transition:all 0.12s;min-height:40px}
.pre:active{transform:scale(0.95)}
.pre.on{background:#534AB7;border-color:#7F77DD;color:#EEEDFE}

.player{background:rgba(255,255,255,0.05);border:0.5px solid rgba(255,255,255,0.08);border-radius:12px;padding:14px;margin-top:14px;display:flex;align-items:center;gap:12px}
.play-btn{width:48px;height:48px;border-radius:50%;background:#534AB7;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.play-btn:active{transform:scale(0.93)}
.play-btn i{font-size:20px;color:#fff}
.prog-wrap{flex:1;min-width:0}
.prog-times{display:flex;justify-content:space-between;font-size:11px;color:rgba(255,255,255,0.35);margin-bottom:8px}
.prog-track{width:100%;height:5px;background:rgba(255,255,255,0.1);border-radius:3px;cursor:pointer}
.prog-fill{height:5px;background:#7F77DD;border-radius:3px;width:0%;transition:width 0.1s linear}

.wa-btn{width:100%;padding:18px;font-size:16px;font-weight:500;border-radius:12px;border:0.5px solid rgba(29,158,117,0.4);background:rgba(29,158,117,0.12);color:#9FE1CB;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;min-height:56px;transition:background 0.15s}
.wa-btn:active{transform:scale(0.97)}
.wa-btn:disabled{opacity:.25;cursor:default}
.wa-hint{font-size:12px;color:rgba(255,255,255,0.28);text-align:center;margin-top:10px}
.hidden{display:none}
</style>

<h2 class="sr-only">הקול של לינוי — מקליט קולי מותאם מובייל</h2>

<div class="app">
  <div class="hero">
    <div class="avatar" id="av"><i class="ti ti-microphone" id="avI" aria-hidden="true"></i></div>
    <h1>הקול של לינוי</h1>
    <small>מהיר · קול רגיל · ללא צ׳יפמאנקס</small>
    <div><span class="pill" id="pill"><span id="pillTxt">מוכן להקלטה</span></span></div>
  </div>

  <div class="body">
    <div class="card">
      <div class="lbl">הקלטה</div>
      <button class="big-btn" id="rb" onclick="tog()">
        <i class="ti ti-microphone" id="rI" style="font-size:22px" aria-hidden="true"></i>
        <span id="rT">התחל הקלטה</span>
      </button>
      <div class="timer hidden" id="tmr">
        <div class="blink"></div><span id="tv">0:00</span>
      </div>
    </div>

    <div class="card hidden" id="spdCard">
      <div class="lbl">מהירות</div>
      <div class="spd-header">
        <div style="line-height:1"><span class="spd-big" id="sN">1.70</span><span class="spd-x">×</span></div>
        <span class="spd-lbl" id="sTag">מהיר</span>
      </div>
      <input type="range" id="sl" min="0.5" max="3.0" step="0.05" value="1.70" oninput="onSpd(this.value)">
      <div class="presets">
        <button class="pre" onclick="setS(1.0)">×1</button>
        <button class="pre on" onclick="setS(1.70)">×1.7</button>
        <button class="pre" onclick="setS(2.0)">×2</button>
        <button class="pre" onclick="setS(2.5)">×2.5</button>
      </div>
      <div class="player" id="playerUI">
        <button class="play-btn" id="playBtn" onclick="togglePlay()" aria-label="נגן/עצור">
          <i class="ti ti-player-play" id="playI" aria-hidden="true"></i>
        </button>
        <div class="prog-wrap">
          <div class="prog-times"><span id="curT">0:00</span><span id="durT">0:00</span></div>
          <div class="prog-track" id="pt" onclick="seek(event)"><div class="prog-fill" id="pf"></div></div>
        </div>
      </div>
    </div>

    <div class="card" id="waC" style="opacity:.2;pointer-events:none">
      <div class="lbl">שיתוף</div>
      <button class="wa-btn" id="waB" onclick="share()" disabled>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="#9FE1CB" aria-hidden="true"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.108.549 4.089 1.508 5.807L0 24l6.362-1.478A11.95 11.95 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.818a9.793 9.793 0 01-4.994-1.369l-.358-.214-3.777.877.899-3.684-.233-.377A9.82 9.82 0 012.182 12C2.182 6.57 6.57 2.182 12 2.182S21.818 6.57 21.818 12 17.43 21.818 12 21.818z"/></svg>
        שלח בווטסאפ
      </button>
      <p class="wa-hint" id="waH">הקלט הודעה תחילה</p>
    </div>
  </div>
</div>

<script>
let mr,ch=[],blob=null,spd=1.70,sec=0,tk;
let vid=null,playing=false,raf=null;

const tl=s=>s<0.8?'איטי מאוד':s<1.0?'איטי':s===1.0?'רגיל':s<1.5?'מהיר קצת':s<2.0?'מהיר':s<2.5?'מהיר מאוד':'טורבו';
const fmt=s=>{if(!isFinite(s))return'0:00';return Math.floor(s/60)+':'+String(Math.floor(s%60)).padStart(2,'0');};

function setPill(t,cls){
  const p=document.getElementById('pill');
  p.className='pill'+(cls?' '+cls:'');
  const d=p.querySelector('.blink');
  if(cls==='rec'){if(!d){const x=document.createElement('div');x.className='blink';p.prepend(x);}}
  else if(d)d.remove();
  document.getElementById('pillTxt').textContent=t;
}

function tog(){if(mr&&mr.state==='recording')stopR();else startR();}

async function startR(){
  try{
    const s=await navigator.mediaDevices.getUserMedia({audio:true});
    ch=[];mr=new MediaRecorder(s);
    mr.ondataavailable=e=>ch.push(e.data);
    mr.onstop=onStop;mr.start();
    document.getElementById('rb').classList.add('rec');
    document.getElementById('rI').className='ti ti-player-stop';
    document.getElementById('rT').textContent='עצור הקלטה';
    document.getElementById('tmr').classList.remove('hidden');
    document.getElementById('av').classList.add('rec');
    document.getElementById('avI').className='ti ti-microphone-off';
    setPill('מקליט...','rec');
    sec=0;tick();tk=setInterval(tick,1000);
  }catch(e){alert('אנא אשר גישה למיקרופון');}
}

function stopR(){
  mr.stop();mr.stream.getTracks().forEach(t=>t.stop());
  clearInterval(tk);
  document.getElementById('rb').classList.remove('rec');
  document.getElementById('rI').className='ti ti-microphone';
  document.getElementById('rT').textContent='הקלט שוב';
  document.getElementById('tmr').classList.add('hidden');
  document.getElementById('av').classList.remove('rec');
  document.getElementById('avI').className='ti ti-microphone';
  setPill('מעבד...');
}

function tick(){document.getElementById('tv').textContent=fmt(sec);sec++;}

async function onStop(){
  blob=new Blob(ch,{type:'audio/webm'});
  await new Promise(r=>setTimeout(r,2000));
  buildVid();
  document.getElementById('spdCard').classList.remove('hidden');
  const c=document.getElementById('waC');c.style.opacity='1';c.style.pointerEvents='auto';
  document.getElementById('waB').disabled=false;
  document.getElementById('waH').textContent='הורד ושלח בווטסאפ';
  setPill('מוכן לשליחה','done');
}

function buildVid(){
  if(vid){vid.pause();vid.src='';}
  vid=document.createElement('video');
  vid.src=URL.createObjectURL(blob);
  vid.style.display='none';
  vid.preload='auto';
  vid.playbackRate=spd;
  if('preservesPitch' in vid)vid.preservesPitch=true;
  else if('webkitPreservesPitch' in vid)vid.webkitPreservesPitch=true;
  document.body.appendChild(vid);
  vid.addEventListener('ended',()=>{playing=false;cancelAnimationFrame(raf);updateUI();updProg();});
  vid.addEventListener('loadedmetadata',updProg);
}

function togglePlay(){
  if(!vid)return;
  if(playing){vid.pause();playing=false;cancelAnimationFrame(raf);}
  else{vid.play();playing=true;loop();}
  updateUI();
}

function loop(){updProg();if(playing)raf=requestAnimationFrame(loop);}

function updProg(){
  if(!vid)return;
  const c=vid.currentTime,d=vid.duration||0,pct=d>0?(c/d)*100:0;
  document.getElementById('pf').style.width=pct+'%';
  document.getElementById('curT').textContent=fmt(c);
  document.getElementById('durT').textContent=fmt(d);
}

function seek(e){
  if(!vid||!vid.duration)return;
  const r=e.currentTarget.getBoundingClientRect();
  vid.currentTime=Math.max(0,Math.min(1,(e.clientX-r.left)/r.width))*vid.duration;
  updProg();
}

function updateUI(){
  document.getElementById('playI').className=playing?'ti ti-player-pause':'ti ti-player-play';
}

function onSpd(v){
  spd=parseFloat(v);
  document.getElementById('sN').textContent=spd.toFixed(2);
  document.getElementById('sTag').textContent=tl(spd);
  if(vid){vid.playbackRate=spd;if('preservesPitch' in vid)vid.preservesPitch=true;}
  document.querySelectorAll('.pre').forEach(b=>b.classList.remove('on'));
  [1.0,1.70,2.0,2.5].forEach((p,i)=>{if(Math.abs(spd-p)<0.01)document.querySelectorAll('.pre')[i].classList.add('on');});
}

function setS(v){document.getElementById('sl').value=v;onSpd(v);}

async function share(){
  if(!blob)return;
  document.getElementById('waH').textContent='ממיר...';
  const ctx=new(window.AudioContext||window.webkitAudioContext)();
  const ab=await blob.arrayBuffer();
  const dec=await ctx.decodeAudioData(ab);
  const nl=Math.ceil(dec.length/spd);
  const off=new OfflineAudioContext(dec.numberOfChannels,nl,Math.round(dec.sampleRate*spd));
  const src=off.createBufferSource();src.buffer=dec;src.connect(off.destination);src.start(0);
  const rnd=await off.startRendering();
  const wav=toWav(rnd);
  const a=document.createElement('a');a.href=URL.createObjectURL(wav);a.download='linoy.wav';a.click();
  document.getElementById('waH').textContent='הקובץ הורד — פתח ווטסאפ וצרף';
  setTimeout(()=>window.open('https://web.whatsapp.com/','_blank'),700);
}

function toWav(b){
  const nc=b.numberOfChannels,sr=b.sampleRate,ns=b.length,bl=nc*2,ds=ns*bl;
  const ab=new ArrayBuffer(44+ds),v=new DataView(ab);
  const ws=(o,s)=>{for(let i=0;i<s.length;i++)v.setUint8(o+i,s.charCodeAt(i));};
  ws(0,'RIFF');v.setUint32(4,36+ds,true);ws(8,'WAVE');ws(12,'fmt ');
  v.setUint32(16,16,true);v.setUint16(20,1,true);v.setUint16(22,nc,true);
  v.setUint32(24,sr,true);v.setUint32(28,sr*bl,true);v.setUint16(32,bl,true);
  v.setUint16(34,16,true);ws(36,'data');v.setUint32(40,ds,true);
  let off=44;
  for(let i=0;i<ns;i++)for(let c=0;c<nc;c++){
    const s=Math.max(-1,Math.min(1,b.getChannelData(c)[i]));
    v.setInt16(off,s<0?s*0x8000:s*0x7FFF,true);off+=2;
  }
  return new Blob([ab],{type:'audio/wav'});
}
</script>
